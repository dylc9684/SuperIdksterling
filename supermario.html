<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Peanut Butter Stick Quest</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #07090d;
      color: #f6eddc;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #game-shell {
      position: relative;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 214, 128, 0.18), transparent 36%),
        linear-gradient(180deg, #111827 0%, #05070b 100%);
    }

    #game {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.7);
    }

    .hud-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      min-height: 32px;
      padding: 7px 11px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(9, 12, 18, 0.56);
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .bossbar {
      width: min(330px, 34vw);
      padding: 8px 10px;
    }

    .bossbar-track {
      height: 8px;
      margin-top: 5px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.18);
      overflow: hidden;
    }

    .bossbar-fill {
      height: 100%;
      width: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ffe08c, #ff6b6b);
      transform-origin: left;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at 46% 22%, rgba(255, 202, 107, 0.2), transparent 36%),
        linear-gradient(180deg, rgba(8, 10, 15, 0.2), rgba(4, 5, 8, 0.82));
      color: #fff8e8;
    }

    .overlay[hidden] {
      display: none;
    }

    .menu-panel {
      width: min(560px, calc(100vw - 28px));
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(8, 12, 18, 0.72);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(18px);
      padding: 24px;
    }

    .menu-title {
      margin: 0 0 10px;
      font-size: clamp(32px, 6vw, 58px);
      line-height: 0.92;
      letter-spacing: 0;
    }

    .menu-copy {
      margin: 0 0 18px;
      color: #e7d6b5;
      font-size: 15px;
      line-height: 1.55;
    }

    .menu-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: linear-gradient(180deg, #ffd36f, #c46c23);
      color: #1d1205;
      font: inherit;
      font-weight: 900;
      padding: 10px 14px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff8e8;
    }

    .touch-controls {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      display: none;
      align-items: flex-end;
      justify-content: space-between;
      pointer-events: none;
    }

    .touch-cluster {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .touch-btn {
      width: 58px;
      height: 58px;
      padding: 0;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(10, 13, 20, 0.58);
      color: #fff8e8;
      border-color: rgba(255, 255, 255, 0.28);
      font-size: 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
      touch-action: none;
      user-select: none;
    }

    .touch-btn.primary {
      background: rgba(255, 195, 82, 0.72);
      color: #1b1004;
    }

    @media (hover: none), (pointer: coarse) {
      .touch-controls {
        display: flex;
      }

      .hud {
        top: 9px;
        left: 9px;
        right: 9px;
      }

      .pill {
        font-size: 12px;
        padding: 6px 8px;
      }
    }
  </style>
</head>
<body>
  <div id="game-shell">
    <canvas id="game" width="960" height="540" aria-label="Peanut Butter Stick Quest game canvas"></canvas>
    <div class="hud" aria-live="polite">
      <div class="hud-group">
        <div class="pill" id="levelHud">LEVEL 1</div>
        <div class="pill" id="scoreHud">SCORE 000000</div>
        <div class="pill" id="coinsHud">COINS 0</div>
        <div class="pill" id="powerHud">SMALL</div>
      </div>
      <div class="pill bossbar" id="bossHud" hidden>
        <div id="bossName">BOSS</div>
        <div class="bossbar-track"><div class="bossbar-fill" id="bossFill"></div></div>
      </div>
    </div>
    <div class="touch-controls" id="touchControls">
      <div class="touch-cluster">
        <button class="touch-btn" data-touch="left" title="Left">&#9664;</button>
        <button class="touch-btn" data-touch="right" title="Right">&#9654;</button>
      </div>
      <div class="touch-cluster">
        <button class="touch-btn" data-touch="attack" title="Attack">&#9679;</button>
        <button class="touch-btn primary" data-touch="jump" title="Jump">&#9650;</button>
      </div>
    </div>
    <div class="overlay" id="overlay">
      <div class="menu-panel">
        <h1 class="menu-title" id="overlayTitle">Peanut Butter Stick Quest</h1>
        <p class="menu-copy" id="overlayCopy">Controls: Arrow keys or A/D move, Space/W/Up jump, F/X/K/Shift attack after powerups. Boss at level 3 and 5.</p>
        <div class="menu-actions">
          <button id="startBtn">Play</button>
          <button class="secondary" id="resetBtn">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const levelHud = document.getElementById("levelHud");
      const scoreHud = document.getElementById("scoreHud");
      const coinsHud = document.getElementById("coinsHud");
      const powerHud = document.getElementById("powerHud");
      const bossHud = document.getElementById("bossHud");
      const bossName = document.getElementById("bossName");
      const bossFill = document.getElementById("bossFill");
      const overlay = document.getElementById("overlay");
      const overlayTitle = document.getElementById("overlayTitle");
      const overlayCopy = document.getElementById("overlayCopy");
      const startBtn = document.getElementById("startBtn");
      const resetBtn = document.getElementById("resetBtn");

      const VIEW_W = 960;
      const VIEW_H = 540;
      const GRAVITY = 0.72;
      const FRICTION_GROUND = 0.78;
      const FRICTION_AIR = 0.94;
      const MAX_FALL = 18;
      const BLOCK_SIZE = 32;
      const BOSS_FIRST_ATTACK = 1.25;
      const BOSS_ATTACK_INTERVAL = 2.5;
      const KING_INTRO_DURATION = 5;
      const COLE_INTRO_DURATION = 3.4;

      const assetPaths = {
        hero: "assets/generated/hero.png",
        goober: "assets/generated/goober.png",
        toiletWalk: "assets/generated/toilet_walk.png",
        toiletShell: "assets/generated/toilet_shell.png",
        pb: "assets/generated/pb.png",
        flame: "assets/generated/flame_pb.png",
        rainbow: "assets/generated/rainbow_pb.png",
        cat: "assets/generated/cat_pb.png",
        king: "assets/generated/king_boss.png",
        cole: "assets/generated/cole_boss.png",
        coin: "assets/generated/coin.png",
        question: "assets/generated/question_block.png",
        brick: "assets/generated/brick_block.png",
        flag: "assets/generated/flag.png",
        rescue: "assets/generated/rescue.png",
        bullet: "assets/generated/bullet.png",
        car: "assets/generated/car.png",
        trashcan: "assets/generated/trashcan.png",
        mayoBottle: "assets/generated/mayo_bottle.png",
        mayoPool: "assets/generated/mayo_pool.png",
        hammerSmash: "assets/generated/hammer_smash.png",
        shockwave: "assets/generated/shockwave.png",
        rock: "assets/generated/rock.png",
        lavaPool: "assets/generated/lava_pool.png",
        bgMeadow: "assets/generated/bg_meadow.jpg",
        bgCave: "assets/generated/bg_cave.jpg",
        bgPlains: "assets/generated/bg_plains.jpg",
        bgSky: "assets/generated/bg_sky.jpg",
        bgCastle: "assets/generated/bg_castle.jpg"
      };

      const assets = {};
      for (const [name, path] of Object.entries(assetPaths)) {
        const image = new Image();
        image.src = path;
        assets[name] = image;
      }

      const sfxPaths = {
        menuStart: "assets/audio/menu_start.mp3",
        levelStart: "assets/audio/level_start.mp3",
        jump: "assets/audio/jump.mp3",
        doubleJump: "assets/audio/double_jump.mp3",
        coin: "assets/audio/coin.mp3",
        questionBlock: "assets/audio/question_block.mp3",
        blockBump: "assets/audio/block_bump.mp3",
        powerup: "assets/audio/powerup.mp3",
        stomp: "assets/audio/stomp.mp3",
        enemyPop: "assets/audio/enemy_pop.mp3",
        toiletShell: "assets/audio/toilet_shell.mp3",
        shellKick: "assets/audio/shell_kick.mp3",
        bulletStomp: "assets/audio/bullet_stomp.mp3",
        bulletShoot: "assets/audio/bullet_shoot.mp3",
        brickBreak: "assets/audio/brick_break.mp3",
        firePeanutAttack: "assets/audio/fire_peanut_attack.mp3",
        catClaw: "assets/audio/cat_claw.mp3",
        rainbowAttack: "assets/audio/rainbow_attack.mp3",
        hurt: "assets/audio/hurt.mp3",
        respawn: "assets/audio/respawn.mp3",
        checkpoint: "assets/audio/checkpoint.mp3",
        flagClear: "assets/audio/flag_clear.mp3",
        bossIntro: "assets/audio/boss_intro.mp3",
        bossWarning: "assets/audio/boss_warning.mp3",
        bossHit: "assets/audio/boss_hit.mp3",
        bossDefeat: "assets/audio/boss_defeat.mp3",
        vonBlicky: "assets/audio/von_blicky.mp3",
        driveby: "assets/audio/driveby.mp3",
        trashcanThrow: "assets/audio/trashcan_throw.mp3",
        bossSlam: "assets/audio/boss_slam.mp3",
        mayoThrow: "assets/audio/mayo_throw.mp3",
        mayoSplat: "assets/audio/mayo_splat.mp3",
        hammerPull: "assets/audio/hammer_pull.mp3",
        hammerSmash: "assets/audio/hammer_smash.mp3",
        shockwave: "assets/audio/shockwave.mp3",
        rockFall: "assets/audio/rock_fall.mp3",
        rockCrash: "assets/audio/rock_crash.mp3",
        rescue: "assets/audio/rescue.mp3"
      };

      const musicPaths = {
        level1: "assets/audio/level1_meadow_theme.mp3",
        level2: "assets/audio/level2_cave_theme.mp3",
        level3: "assets/audio/level3_plains_theme.mp3",
        level3Boss: "assets/audio/level3_boss_theme.mp3",
        level4: "assets/audio/level4_cloud_theme.mp3",
        level5: "assets/audio/level5_castle_theme.mp3",
        level5Boss: "assets/audio/level5_castle_boss_theme.mp3"
      };

      const audio = {
        unlocked: false,
        sfx: {},
        music: null,
        musicKey: "",
        context: null,
        fallback: null,
        fallbackKey: "",
        sfxVolume: 0.72,
        musicVolume: 0.34
      };

      for (const [name, path] of Object.entries(sfxPaths)) {
        audio.sfx[name] = path;
      }

      const keys = new Set();
      const touch = { left: false, right: false, jump: false, attack: false };
      const mobileButtons = document.querySelectorAll("[data-touch]");
      const randSeed = { value: 42 };

      function seeded() {
        randSeed.value = (randSeed.value * 1664525 + 1013904223) >>> 0;
        return randSeed.value / 4294967296;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function rectsOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function circleCoinHit(player, coin) {
        const cx = coin.x + coin.r;
        const cy = coin.y + coin.r;
        const nearestX = clamp(cx, player.x, player.x + player.w);
        const nearestY = clamp(cy, player.y, player.y + player.h);
        const dx = cx - nearestX;
        const dy = cy - nearestY;
        return dx * dx + dy * dy < coin.r * coin.r;
      }

      function drawRoundRect(c, x, y, w, h, r) {
        const rr = Math.min(r, w / 2, h / 2);
        c.beginPath();
        c.moveTo(x + rr, y);
        c.arcTo(x + w, y, x + w, y + h, rr);
        c.arcTo(x + w, y + h, x, y + h, rr);
        c.arcTo(x, y + h, x, y, rr);
        c.arcTo(x, y, x + w, y, rr);
        c.closePath();
      }

      function drawAsset(c, name, x, y, w, h, options = {}) {
        const image = assets[name];
        if (!image || !image.complete || image.naturalWidth === 0) return false;
        c.save();
        const alpha = options.alpha ?? 1;
        c.globalAlpha *= alpha;
        const cx = x + w / 2;
        const cy = y + h / 2;
        c.translate(cx, cy);
        if (options.flip) c.scale(-1, 1);
        if (options.rotate) c.rotate(options.rotate);
        if (options.squash) c.scale(1 + options.squash * 0.08, 1 - options.squash * 0.04);
        c.drawImage(image, -w / 2, -h / 2, w, h);
        c.restore();
        return true;
      }

      function drawAssetContain(c, name, x, y, w, h, options = {}) {
        const image = assets[name];
        if (!image || !image.complete || image.naturalWidth === 0) return false;
        const scale = Math.min(w / image.naturalWidth, h / image.naturalHeight);
        const drawW = image.naturalWidth * scale;
        const drawH = image.naturalHeight * scale;
        return drawAsset(c, name, x + (w - drawW) / 2, y + (h - drawH) / 2, drawW, drawH, options);
      }

      function paddedScore(score) {
        return String(Math.max(0, Math.floor(score))).padStart(6, "0");
      }

      function powerRank(power) {
        return { small: 0, pb: 1, flame: 2, cat: 3, rainbow: 4 }[power] || 0;
      }

      function powerLabel(power) {
        return {
          small: "SMALL",
          pb: "PEANUT",
          flame: "FLAME PB",
          cat: "CAT PB",
          rainbow: "RAINBOW PB"
        }[power] || "SMALL";
      }

      function unlockAudio() {
        if (audio.unlocked) return;
        audio.unlocked = true;
        ensureAudioContext();
      }

      function ensureAudioContext() {
        if (!audio.context) {
          const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextCtor) return null;
          audio.context = new AudioContextCtor();
        }
        if (audio.context.state === "suspended") {
          audio.context.resume().catch(() => {});
        }
        return audio.context;
      }

      function playSfx(name, volume = 1) {
        if (!audio.unlocked) return;
        const path = audio.sfx[name];
        if (!path) return;
        const clip = new Audio(path);
        clip.volume = clamp(audio.sfxVolume * volume, 0, 1);
        clip.play().catch(() => {});
      }

      function playTone(ctxAudio, destination, frequency, start, duration, options = {}) {
        const osc = ctxAudio.createOscillator();
        const gain = ctxAudio.createGain();
        const filter = ctxAudio.createBiquadFilter();
        osc.type = options.type || "sawtooth";
        osc.frequency.setValueAtTime(frequency, start);
        if (options.slideTo) {
          osc.frequency.exponentialRampToValueAtTime(Math.max(20, options.slideTo), start + duration);
        }
        filter.type = options.filterType || "lowpass";
        filter.frequency.setValueAtTime(options.filter || 2200, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(Math.max(0.0002, options.gain || 0.06), start + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(destination);
        osc.start(start);
        osc.stop(start + duration + 0.03);
      }

      function playNoise(ctxAudio, destination, start, duration, options = {}) {
        const bufferSize = Math.max(1, Math.floor(ctxAudio.sampleRate * duration));
        const buffer = ctxAudio.createBuffer(1, bufferSize, ctxAudio.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i += 1) {
          data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        }
        const source = ctxAudio.createBufferSource();
        const filter = ctxAudio.createBiquadFilter();
        const gain = ctxAudio.createGain();
        source.buffer = buffer;
        filter.type = options.filterType || "highpass";
        filter.frequency.setValueAtTime(options.filter || 1800, start);
        gain.gain.setValueAtTime(options.gain || 0.04, start);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        source.connect(filter);
        filter.connect(gain);
        gain.connect(destination);
        source.start(start);
      }

      function fallbackPattern(key) {
        const patterns = {
          level1: { bpm: 126, root: 196, scale: [0, 3, 5, 7, 10, 12], bass: [0, 0, 7, 5, 3, 5, 7, 10], lead: [12, 10, 7, 5, 7, 10, 12, 15], boss: false },
          level2: { bpm: 116, root: 146.83, scale: [0, 2, 3, 7, 10, 12], bass: [0, -12, 3, -12, 7, 3, 0, -12], lead: [7, 10, 12, 10, 7, 3, 2, 0], boss: false },
          level3: { bpm: 132, root: 174.61, scale: [0, 2, 5, 7, 9, 12], bass: [0, 0, 5, 7, 9, 7, 5, 2], lead: [12, 9, 7, 5, 7, 9, 14, 12], boss: false },
          level4: { bpm: 144, root: 220, scale: [0, 2, 4, 7, 9, 12], bass: [0, 7, 4, 9, 0, 12, 9, 7], lead: [12, 16, 14, 12, 19, 16, 14, 12], boss: false },
          level5: { bpm: 128, root: 130.81, scale: [0, 1, 5, 7, 8, 12], bass: [0, -12, 5, 0, 8, 7, 5, -12], lead: [12, 8, 7, 5, 7, 12, 13, 12], boss: false },
          level3Boss: { bpm: 184, root: 110, scale: [0, 1, 3, 6, 7, 10, 12], bass: [0, 0, -12, 6, 0, 7, 6, 3, -12, 0, 10, 7, 6, 3, 1, 0], lead: [24, 22, 19, 18, 15, 18, 19, 22, 24, 27, 24, 22, 19, 18, 15, 12], boss: true },
          level5Boss: { bpm: 192, root: 98, scale: [0, 1, 3, 6, 7, 10, 12], bass: [0, -12, 0, 6, 7, 0, 10, 6, 0, -12, 3, 6, 7, 10, 12, 7], lead: [24, 19, 22, 27, 24, 22, 19, 18, 15, 18, 22, 24, 27, 31, 27, 24], boss: true }
        };
        return patterns[key] || patterns.level1;
      }

      function noteFrequency(root, semitone) {
        return root * Math.pow(2, semitone / 12);
      }

      function stopFallbackMusic() {
        if (!audio.fallback) return;
        clearInterval(audio.fallback.timer);
        try {
          audio.fallback.master.gain.exponentialRampToValueAtTime(0.0001, audio.context.currentTime + 0.18);
        } catch (_) {}
        audio.fallback = null;
        audio.fallbackKey = "";
      }

      function startFallbackMusic(key) {
        const ctxAudio = ensureAudioContext();
        if (!audio.unlocked || !ctxAudio) return;
        if (audio.fallbackKey === key) return;
        stopFallbackMusic();
        const pattern = fallbackPattern(key);
        const master = ctxAudio.createGain();
        const compressor = ctxAudio.createDynamicsCompressor();
        master.gain.setValueAtTime(audio.musicVolume * (pattern.boss ? 0.62 : 0.45), ctxAudio.currentTime);
        master.connect(compressor);
        compressor.connect(ctxAudio.destination);
        let step = 0;
        const stepTime = 60 / pattern.bpm / 2;
        const schedule = () => {
          const now = ctxAudio.currentTime + 0.035;
          const bassSemi = pattern.bass[step % pattern.bass.length];
          const leadSemi = pattern.lead[step % pattern.lead.length];
          const bassFreq = noteFrequency(pattern.root, bassSemi);
          const leadFreq = noteFrequency(pattern.root, leadSemi);
          if (pattern.boss) {
            playTone(ctxAudio, master, bassFreq, now, stepTime * 0.78, { type: "sawtooth", gain: 0.12, filter: 520, slideTo: bassFreq * 0.5 });
            if (step % 2 === 0) playTone(ctxAudio, master, leadFreq, now + 0.02, stepTime * 0.46, { type: "square", gain: 0.045, filter: 2200 });
            if (step % 4 === 0) playNoise(ctxAudio, master, now, 0.08, { gain: 0.11, filter: 120, filterType: "lowpass" });
            if (step % 4 === 2) playNoise(ctxAudio, master, now, 0.09, { gain: 0.07, filter: 1700, filterType: "bandpass" });
            playNoise(ctxAudio, master, now + stepTime * 0.5, 0.035, { gain: 0.028, filter: 5200, filterType: "highpass" });
          } else {
            if (step % 2 === 0) playTone(ctxAudio, master, bassFreq, now, stepTime * 0.9, { type: "triangle", gain: 0.06, filter: 900 });
            if (step % 4 === 1) playTone(ctxAudio, master, leadFreq * 2, now, stepTime * 0.75, { type: "sine", gain: 0.035, filter: 3000 });
            if (step % 4 === 0) playNoise(ctxAudio, master, now, 0.045, { gain: 0.035, filter: 3200, filterType: "highpass" });
          }
          step += 1;
        };
        schedule();
        const timer = setInterval(schedule, stepTime * 1000);
        audio.fallback = { timer, master };
        audio.fallbackKey = key;
      }

      function musicKeyForLevel(level = game.level) {
        if (!level) return "";
        const index = level.index + 1;
        if (level.boss && level.boss.active && !level.boss.dead && !level.boss.intro) {
          return index === 5 ? "level5Boss" : "level3Boss";
        }
        return `level${index}`;
      }

      function playMusic(key, force = false) {
        if (!audio.unlocked || !key || !musicPaths[key]) return;
        if (!force && audio.musicKey === key) return;
        if (audio.music) {
          audio.music.pause();
          audio.music = null;
        }
        const track = new Audio(musicPaths[key]);
        track.loop = true;
        track.volume = audio.musicVolume;
        audio.music = track;
        audio.musicKey = key;
        track.addEventListener("playing", () => stopFallbackMusic(), { once: true });
        track.addEventListener("error", () => startFallbackMusic(key), { once: true });
        track.play().then(() => stopFallbackMusic()).catch(() => startFallbackMusic(key));
      }

      function updateMusic(force = false) {
        playMusic(musicKeyForLevel(), force);

        if (audio.music) {

        const left = keys.has("ArrowLeft") || keys.has("KeyA") || touch.left;
        const right = keys.has("ArrowRight") || keys.has("KeyD") || touch.right;
        const jumpNow = keys.has("ArrowUp") || keys.has("KeyW") || keys.has("Space") || touch.jump;
        const attackNow = keys.has("KeyX") || keys.has("KeyK") || keys.has("KeyF") || keys.has("ShiftLeft") || keys.has("ShiftRight") || touch.attack;
        input.jumpPressed = jumpNow && !input.prevJump;
        input.attackPressed = attackNow && !input.prevAttack;
        input.prevJump = jumpNow;
        input.prevAttack = attackNow;
        return { left, right, jumpNow, attackNow, jumpPressed: input.jumpPressed, attackPressed: input.attackPressed };
      }

      function persistentPowerFrom(player) {
        if (!player) return { power: "small", storedPower: "pb" };
        if (player.power === "rainbow") {
          return {
            power: player.storedPower && player.storedPower !== "small" ? player.storedPower : "pb",

          };

        if (player.power === "small") {

        return {

      function applyCarriedPower(player) {
        const carriedPower = game.carryPower || "small";

      function setPlayerPower(power) {
        const p = game.player;

        p.h = p.power === "small" ? 76 : 91;

        const p = game.player;
