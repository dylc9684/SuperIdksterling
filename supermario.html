      function solidsForLevel(level) {
        const blocks = level.blocks.filter((block) => block.alive && block.solid);
        const solids = level.platforms.concat(blocks);
        if (level.boss && level.boss.active && !level.boss.dead) {
          return solids.concat({ x: level.boss.arenaEnd, y: 210, w: 26, h: 260, type: "gate", solid: true });
        }
        return solids;
      }

      function hitBlockFromBelow(block) {
        if (!block || !block.kind || !block.alive) return;
        if (block.bump > 0.05) return;
        block.bump = 0.22;
        if (block.kind === "question") {
          if (block.used) return;
          block.used = true;
          game.score += 200;
          playSfx("questionBlock");
          if (block.content === "power") {
            addPower(game.level, block.power, block.x - 3, block.y + block.h + 8);
          } else {
            game.coins += 1;
            game.score += 100;
            game.level.effects.push({ type: "coin", x: block.x + block.w / 2, y: block.y - 16, ttl: 0.55 });
            playSfx("coin", 0.9);
          }
          return;
        }
        if (block.kind === "brick") {
          if (game.player.power !== "small" || game.player.starTimer > 0) {
            block.alive = false;
            block.solid = false;
            game.score += 50;
            game.level.effects.push({ type: "brickBurst", x: block.x + block.w / 2, y: block.y + block.h / 2, ttl: 0.55 });
            playSfx("brickBreak");
          } else {
            playSfx("blockBump", 0.65);
          }
        }
      }

      function resolveAgainstSolids(entity, solids, axis) {
        for (const solid of solids) {
          if (!solid.solid) continue;
          if (!rectsOverlap(entity, solid)) continue;
          if (axis === "x") {
            if (entity.vx > 0) entity.x = solid.x - entity.w;
            if (entity.vx < 0) entity.x = solid.x + solid.w;
            entity.vx = 0;
            entity.hitWall = true;
          } else {
            if (entity.vy > 0) {
              entity.y = solid.y - entity.h;
              entity.vy = 0;
              entity.onGround = true;
            } else if (entity.vy < 0) {
              entity.y = solid.y + solid.h;
              if (entity === game.player) hitBlockFromBelow(solid);
              entity.vy = 0;
            }
          }
        }
      }

      function moveWithCollisions(entity, solids) {
        entity.hitWall = false;
        entity.onGround = false;
        entity.x += entity.vx;
        resolveAgainstSolids(entity, solids, "x");
        entity.y += entity.vy;
        resolveAgainstSolids(entity, solids, "y");
      }

      function hasFloorAhead(enemy, level) {
        const probe = {
          x: enemy.x + (enemy.vx > 0 ? enemy.w + 4 : -8),
          y: enemy.y + enemy.h + 4,
          w: 8,
          h: 8
        };
        return solidsForLevel(level).some((solid) => rectsOverlap(probe, solid));
      }

      function updatePlayer(dt) {
        const level = game.level;
        const p = game.player;
        const controls = getInput();
        const speed = p.power === "cat" ? 0.72 : 0.62;
        const maxSpeed = p.power === "cat" ? 6.3 : 5.4;
        if (controls.left) {
          p.vx -= speed;
          p.facing = -1;
        }
        if (controls.right) {
          p.vx += speed;
          p.facing = 1;
        }
        p.vx = clamp(p.vx, -maxSpeed, maxSpeed);
        p.vx *= p.onGround ? FRICTION_GROUND : FRICTION_AIR;
        p.vy = clamp(p.vy + GRAVITY, -24, MAX_FALL);
        if (p.onGround) {
          p.coyote = 0.12;
          p.doubleJump = p.power === "cat";
        } else {
          p.coyote -= dt;
        }
        if (controls.jumpPressed) p.jumpBuffer = 0.12;
        p.jumpBuffer -= dt;
        if (p.jumpBuffer > 0 && (p.onGround || p.coyote > 0 || p.doubleJump)) {
          const usedDoubleJump = !p.onGround && p.coyote <= 0 && p.doubleJump;
          if (!p.onGround && p.coyote <= 0 && p.doubleJump) {
            p.doubleJump = false;
            level.effects.push({ type: "paw", x: p.x + p.w / 2, y: p.y + p.h * 0.68, ttl: 0.35 });
          }
          p.vy = p.power === "cat" ? -15.6 : -14.6;
          p.onGround = false;
          p.coyote = 0;
          p.jumpBuffer = 0;
          playSfx(usedDoubleJump ? "doubleJump" : "jump");
        }
        if (controls.attackPressed) firePlayerShot();
        p.attackCooldown = Math.max(0, p.attackCooldown - dt);
        p.invuln = Math.max(0, p.invuln - dt);
        if (p.starTimer > 0) {
          p.starTimer = Math.max(0, p.starTimer - dt);
          if (p.starTimer === 0 && p.power === "rainbow") {
            const bottom = p.y + p.h;
            p.power = p.storedPower === "small" ? "pb" : p.storedPower;
            p.h = p.power === "small" ? 76 : 91;
            p.y = bottom - p.h;
          }
        }
        moveWithCollisions(p, solidsForLevel(level));
        if (p.y > VIEW_H + 140) respawnPlayer();
        if (p.x > level.length - p.w) p.x = level.length - p.w;
        if (p.x < 0) p.x = 0;
        if (!level.checkpointReached && p.x >= level.checkpoint.x) {
          level.checkpointReached = true;
          game.levelMessage = "CHECKPOINT";
          game.levelMessageTimer = 1.4;
          game.score += 1000;
          playSfx("checkpoint");
        }
      }

      function firePlayerShot() {
        const p = game.player;
        const level = game.level;
        if (p.attackCooldown > 0) return;
        if (!["flame", "cat", "rainbow"].includes(p.power)) return;
        const kind = p.power === "cat" ? "claw" : (p.power === "rainbow" ? "rainbow" : "flame");
        level.shots.push({
          type: kind,
          x: p.x + p.w / 2 + p.facing * 18,
          y: p.y + (p.power === "small" ? 26 : 34),
          w: kind === "claw" ? 46 : 22,
          h: kind === "claw" ? 34 : 22,
          vx: p.facing * (kind === "claw" ? 8.5 : 9.4),
          vy: kind === "claw" ? -0.2 : -1.8,
          ttl: kind === "claw" ? 0.22 : 1.45,
          facing: p.facing
        });
        p.attackCooldown = kind === "claw" ? 0.34 : 0.28;
        playSfx(kind === "claw" ? "catClaw" : (kind === "rainbow" ? "rainbowAttack" : "firePeanutAttack"));
      }

      function updateEnemies(dt) {
        const level = game.level;
        const p = game.player;
        const solids = solidsForLevel(level);
        for (const enemy of level.enemies) {
          if (!enemy.alive) continue;
          enemy.phase += dt * 8;
          if (enemy.type === "flyingToilet") {
            enemy.x += enemy.vx;
            enemy.y = enemy.homeY + Math.sin(game.globalTime * enemy.speed + enemy.phase) * enemy.amp;
            if (enemy.x < game.cameraX - 180) enemy.x = game.cameraX + VIEW_W + 180;
          } else {
            if (enemy.state === "shell") {
              enemy.shellTimer += dt;
              enemy.vx *= Math.abs(enemy.vx) > 0.2 ? 0.995 : 0;
            }
            enemy.vy = clamp(enemy.vy + GRAVITY, -12, MAX_FALL);
            moveWithCollisions(enemy, solids);
            if (enemy.hitWall || (!hasFloorAhead(enemy, level) && enemy.onGround && enemy.state !== "shell")) {
              enemy.vx *= -1;
            }
          }

          if (!rectsOverlap(p, enemy)) continue;
          const topWindow = enemy.type === "flyingToilet" ? 26 : 18;
          const fallingOnTop = p.vy > 0 && p.y + p.h - p.vy <= enemy.y + topWindow;
          if (fallingOnTop) {
            if (enemy.type === "toilet") {
              if (enemy.state === "walk") {
                enemy.state = "shell";
                enemy.vx = 0;
                enemy.h = 42;
                enemy.y += 16;
                game.score += 400;
                playSfx("toiletShell");
              } else {
                enemy.vx = p.x + p.w / 2 < enemy.x + enemy.w / 2 ? 8 : -8;
                game.score += 150;
                playSfx("shellKick");
              }
              p.vy = -10.8;
            } else if (enemy.type === "flyingToilet") {
              enemy.alive = false;
              level.effects.push({ type: "pop", x: enemy.x + enemy.w / 2, y: enemy.y + enemy.h / 2, ttl: 0.45 });
              p.vy = -11.5;
              game.score += 650;
              playSfx("stomp");
            } else {
              enemy.alive = false;
              level.effects.push({ type: "pop", x: enemy.x + enemy.w / 2, y: enemy.y + enemy.h / 2, ttl: 0.45 });
              p.vy = -10.5;
              game.score += 300;
              playSfx("stomp");
            }
          } else if (enemy.type === "toilet" && enemy.state === "shell" && Math.abs(enemy.vx) < 1.2) {
            enemy.vx = p.x < enemy.x ? 8.3 : -8.3;
            p.vx = -Math.sign(enemy.vx) * 4;
            playSfx("shellKick");
          } else {
            demotePlayer(false);
          }
        }

        for (const shell of level.enemies.filter((e) => e.alive && e.type === "toilet" && e.state === "shell" && Math.abs(e.vx) > 3)) {
          for (const enemy of level.enemies) {
            if (enemy === shell || !enemy.alive || enemy.state === "shell") continue;
            if (rectsOverlap(shell, enemy)) {
              enemy.alive = false;
              shell.vx *= -1;
              level.effects.push({ type: "pop", x: enemy.x + enemy.w / 2, y: enemy.y + enemy.h / 2, ttl: 0.45 });
              game.score += 250;
              playSfx("enemyPop");
            }
          }
        }
      }

      function updatePowerups(dt) {
        const p = game.player;
        for (const item of game.level.powerups) {
          if (item.taken) continue;
          item.bob += dt * 3;
          if (rectsOverlap(p, item)) {
            item.taken = true;
            setPlayerPower(item.type);
            game.level.effects.push({ type: "sparkle", x: item.x + item.w / 2, y: item.y + item.h / 2, ttl: 0.8 });
          }
        }
      }

      function updateCoins(dt) {
        const p = game.player;
        for (const coin of game.level.coins) {
          if (coin.taken) continue;
          coin.bob += dt * 5;
          if (circleCoinHit(p, coin)) {
            coin.taken = true;
            game.coins += 1;
            game.score += 100;
            game.level.effects.push({ type: "coin", x: coin.x + coin.r, y: coin.y + coin.r, ttl: 0.45 });
            playSfx("coin");
          }
        }
      }

      function updateShots(dt) {
        const level = game.level;
        for (const shot of level.shots) {
          shot.ttl -= dt;
          shot.x += shot.vx;
          shot.y += shot.vy;
          if (shot.type !== "claw") shot.vy += 0.18;
          for (const enemy of level.enemies) {
            if (!enemy.alive || !rectsOverlap(shot, enemy)) continue;
            enemy.alive = false;
            shot.ttl = 0;
            level.effects.push({ type: "pop", x: enemy.x + enemy.w / 2, y: enemy.y + enemy.h / 2, ttl: 0.45 });
            game.score += 350;
            playSfx("enemyPop");
          }
          if (level.boss && level.boss.active && !level.boss.dead && !level.boss.intro && rectsOverlap(shot, level.boss)) {
            hurtBoss(level.boss, 100);
            shot.ttl = 0;
          }
        }
        level.shots = level.shots.filter((shot) => shot.ttl > 0);
      }

      function hurtBoss(boss, amount) {
        if (boss.dead || boss.intro) return;
        boss.hp = Math.max(0, boss.hp - amount);
        boss.flash = 0.18;
        game.screenShake = 8;
        game.score += amount * 8;
        if (boss.hp <= 0) {
          boss.dead = true;
          boss.active = false;
          boss.pose = "defeated";
          game.level.hazards = game.level.hazards.filter((h) => h.static);
          game.level.effects.push({ type: "bossPop", x: boss.x + boss.w / 2, y: boss.y + boss.h / 2, ttl: 1.8 });
          game.score += 6000;
          if (game.level.rescue) {
            game.level.rescue.active = true;
            game.levelMessage = "RESCUE UNLOCKED";
          } else {
            game.levelMessage = "BOSS CLEARED";
          }
          game.levelMessageTimer = 2;
          playSfx("bossDefeat");
          updateMusic(true);
        } else {
          playSfx("bossHit", 0.8);
        }
      }

      function stompBossIfNeeded() {
        const level = game.level;
        const p = game.player;
        const boss = level.boss;
        if (!boss || !boss.active || boss.dead) return;
        if (!rectsOverlap(p, boss)) return;
        const fallingOnTop = p.vy > 0 && p.y + p.h - p.vy <= boss.y + boss.h * 0.35;
        if (fallingOnTop) {
          hurtBoss(boss, 50);
          p.vy = -13;
          p.y = boss.y - p.h - 2;
        } else {
          demotePlayer(false);
        }
      }

      function spawnHazard(level, hazard) {
        level.hazards.push(hazard);
      }

      function startKingAttack(boss, level) {
        const attacks = ["blicky", "driveby", "trashcan", "jump"];
        boss.nextAttack = attacks[boss.attackStep % attacks.length];
        boss.attackStep += 1;
        boss.attackTimer = BOSS_ATTACK_INTERVAL;
        boss.pose = boss.nextAttack;
        const p = game.player;
        if (boss.nextAttack === "blicky") {
          playSfx("bossWarning", 0.55);
          playSfx("vonBlicky");
          for (let i = 0; i < 3; i += 1) {
            spawnHazard(level, {
              type: "bullet",
              x: boss.x - 12,
              y: boss.y + 42 + i * 8,
              w: 22,
              h: 10,
              vx: -8.5 - i * 0.8,
              vy: -0.7 + i * 0.3,
              ttl: 2.4,
              deadly: true,
              delay: 0.45 + i * 0.12
            });
          }
        } else if (boss.nextAttack === "driveby") {
          playSfx("bossWarning", 0.55);
          playSfx("driveby");
          spawnHazard(level, {
            type: "car",
            x: boss.arenaEnd + 80,
            y: 405,
            w: 150,
            h: 58,
            vx: -9.3,
            vy: 0,
            ttl: 4,
            deadly: true,
            delay: 0.55
          });
        } else if (boss.nextAttack === "trashcan") {
          const dx = p.x - boss.x;
          playSfx("bossWarning", 0.55);
          playSfx("trashcanThrow");
          spawnHazard(level, {
            type: "trashcan",
            x: boss.x - 10,
            y: boss.y + 22,
            w: 34,
            h: 42,
            vx: clamp(dx / 48, -8, -4.2),
            vy: -8,
            ttl: 4,
            deadly: true,
            gravity: 0.36,
            delay: 0.45
          });
        } else if (boss.nextAttack === "jump") {
          const warningW = 264;
          const warningH = 168;
          const targetX = clamp(p.x + p.w / 2 - warningW / 2, boss.arenaStart + 60, boss.arenaEnd - warningW - 60);
          playSfx("bossWarning");
          boss.jumpTelegraph = {
            startX: boss.x,
            targetX: targetX + warningW / 2 - boss.w / 2,
            baseY: 348,
            duration: 1.18,
            ttl: 1.18
          };
          spawnHazard(level, {
            type: "landingWarning",
            x: targetX,
            y: 462 - warningH,
            w: warningW,
            h: warningH,
            ttl: 1.18,
            targetBoss: boss,
            deadly: false
          });
        }
      }

      function startColeAttack(boss, level) {
        const attacks = ["mayo", "hammer", "shockwave", "ceiling"];
        boss.nextAttack = attacks[boss.attackStep % attacks.length];
        boss.attackStep += 1;
        boss.attackTimer = BOSS_ATTACK_INTERVAL;
        boss.pose = boss.nextAttack;
        const p = game.player;
        if (boss.nextAttack === "mayo") {
          playSfx("bossWarning", 0.55);
          playSfx("mayoThrow");
          for (let i = 0; i < 5; i += 1) {
            spawnHazard(level, {
              type: "mayoBottle",
              x: boss.x + 28,
              y: boss.y + 34,
              w: 22,
              h: 44,
              vx: -7 + i * 1.65,
              vy: -9.5 - Math.abs(i - 2) * 0.65,
              ttl: 4,
              deadly: true,
              gravity: 0.42,
              delay: 0.15 * i
            });
          }
        } else if (boss.nextAttack === "hammer") {
          const hammerW = 282;
          const hammerH = 294;
          const hitX = clamp(p.x + p.w / 2 - hammerW / 2, boss.arenaStart + 60, boss.arenaEnd - hammerW - 60);
          playSfx("bossWarning", 0.65);
          playSfx("hammerPull");
          boss.hammerTelegraph = {
            duration: 0.92,
            ttl: 0.92
          };
          spawnHazard(level, {
            type: "hammerWarning",
            x: hitX,
            y: 462 - hammerH,
            w: hammerW,
            h: hammerH,
            ttl: 0.92,
            deadly: false
          });
        } else if (boss.nextAttack === "shockwave") {
          playSfx("bossWarning", 0.55);
          playSfx("shockwave");
          spawnHazard(level, { type: "shockwave", x: boss.x + 10, y: 432, w: 48, h: 30, vx: -7.3, vy: 0, ttl: 4, deadly: true, delay: 0.45 });
          spawnHazard(level, { type: "shockwave", x: boss.x + boss.w - 58, y: 432, w: 48, h: 30, vx: 7.3, vy: 0, ttl: 4, deadly: true, delay: 0.45 });
        } else if (boss.nextAttack === "ceiling") {
          playSfx("bossWarning", 0.55);
          playSfx("rockFall");
          for (let i = 0; i < 4; i += 1) {
            const rockX = clamp(p.x - 120 + i * 82, boss.arenaStart + 70, boss.arenaEnd - 90);
            spawnHazard(level, { type: "rockWarning", x: rockX, y: 100, w: 54, h: 360, ttl: 0.8 + i * 0.12, deadly: false });
          }
        }
      }

      function beginBossIntro(boss) {
        boss.pose = "intro";
        boss.attackTimer = BOSS_FIRST_ATTACK;
        if (boss.kind === "king") {
          const introX = clamp(game.player.x + 650, boss.arenaStart + 540, boss.arenaEnd - 260);
          boss.x = introX;
          boss.intro = {
            type: "fall",
            duration: KING_INTRO_DURATION,
            ttl: KING_INTRO_DURATION,
            startX: introX,
            targetX: introX,
            startY: -250,
            targetY: 348
          };
          boss.y = boss.intro.startY;
          game.levelMessage = "KING VON DROPS IN";
          game.levelMessageTimer = KING_INTRO_DURATION;
        } else {
          const introX = clamp(game.player.x + 610, boss.arenaStart + 500, boss.arenaEnd - 300);
          boss.x = introX;
          boss.intro = {
            type: "emerge",
            duration: COLE_INTRO_DURATION,
            ttl: COLE_INTRO_DURATION,
            startX: introX,
            targetX: introX,
            startY: 560,
            targetY: 310
          };
          boss.y = boss.intro.startY;
          game.levelMessage = "COLE BREAKS OUT";
          game.levelMessageTimer = COLE_INTRO_DURATION;
        }
      }

      function updateBossIntro(boss, dt) {
        const intro = boss.intro;
        if (!intro) return false;
        intro.ttl = Math.max(0, intro.ttl - dt);
        const t = clamp(1 - intro.ttl / intro.duration, 0, 1);
        if (intro.type === "fall") {
          const fall = t * t * (3 - 2 * t);
          boss.x = intro.startX + Math.sin(t * Math.PI * 8) * 18 * (1 - t);
          boss.y = lerp(intro.startY, intro.targetY, fall);
          boss.pose = "introFall";
          if (intro.ttl <= 0) {
            boss.x = intro.targetX;
            boss.y = intro.targetY;
            boss.intro = null;
            boss.pose = "idle";
            boss.attackTimer = BOSS_FIRST_ATTACK;
            game.screenShake = 22;
            game.levelMessage = "FIGHT";
            game.levelMessageTimer = 1.1;
            playSfx("bossSlam");
            updateMusic(true);
          }
          return true;
        }
        const rise = 1 - Math.pow(1 - t, 3);
        boss.x = intro.startX + Math.sin(t * Math.PI * 2) * 9 * (1 - t);
        boss.y = lerp(intro.startY, intro.targetY, rise) - Math.sin(t * Math.PI) * 92;
        boss.pose = "introEmerge";
        if (intro.ttl <= 0) {
          boss.x = intro.targetX;
          boss.y = intro.targetY;
          boss.intro = null;
          boss.pose = "idle";
          boss.attackTimer = BOSS_FIRST_ATTACK;
          game.screenShake = 18;
          game.levelMessage = "FIGHT";
          game.levelMessageTimer = 1.1;
          playSfx("hammerSmash");
          updateMusic(true);
        }
        return true;
      }

      function updateBoss(dt) {
        const level = game.level;
        const boss = level.boss;
        if (!boss || boss.dead) return;
        const p = game.player;
        if (!boss.active && p.x > boss.arenaStart) {
          boss.active = true;
          game.level.checkpointReached = true;
          game.screenShake = 10;
          playSfx("bossIntro");
          beginBossIntro(boss);
          updateMusic(true);
        }
        if (!boss.active) return;
        boss.flash = Math.max(0, (boss.flash || 0) - dt);
        if (updateBossIntro(boss, dt)) return;
        let movementLocked = false;
        if (boss.jumpTelegraph) {
          const jump = boss.jumpTelegraph;
          jump.ttl = Math.max(0, jump.ttl - dt);
          const t = clamp(1 - jump.ttl / jump.duration, 0, 1);
          boss.x = lerp(jump.startX, jump.targetX, t);
          boss.y = jump.baseY - Math.sin(t * Math.PI) * 190;
          movementLocked = true;
        }
        if (boss.hammerTelegraph) {
          boss.hammerTelegraph.ttl = Math.max(0, boss.hammerTelegraph.ttl - dt);
          if (boss.hammerTelegraph.ttl <= 0) boss.hammerTelegraph = null;
        }
        boss.attackTimer -= dt;
        if (boss.attackTimer <= 0) {
          if (boss.kind === "king") startKingAttack(boss, level);
          if (boss.kind === "cole") startColeAttack(boss, level);
        }
        if (!movementLocked) {
          const target = clamp(p.x, boss.arenaStart + 90, boss.arenaEnd - 170);
          boss.x = lerp(boss.x, target + (boss.kind === "cole" ? 90 : 160), boss.kind === "cole" ? 0.008 : 0.006);
          boss.y = boss.kind === "cole" ? 310 + Math.sin(game.globalTime * 2.2) * 2 : 348 + Math.sin(game.globalTime * 2.6) * 3;
        }
        stompBossIfNeeded();
      }

      function updateBulletSpawners(dt) {
        const level = game.level;
        for (const spawner of level.bulletSpawners) {
          if (Math.abs(spawner.x - game.player.x) > 900) continue;
          spawner.timer -= dt;
          if (spawner.timer <= 0) {
            spawner.timer = spawner.cooldown;
            spawnHazard(level, {
              type: "bulletBill",
              x: spawner.x,
              y: spawner.y,
              w: 50,
              h: 30,
              vx: spawner.dir * 6.8,
              vy: 0,
              ttl: 5,
              deadly: true
            });
            playSfx("bulletShoot", 0.75);
          }
        }
      }

      function hazardRect(h) {
        return { x: h.x, y: h.y, w: h.w, h: h.h };
      }

      function isStompableHazard(h) {
        return h.type === "bullet" || h.type === "bulletBill";
      }

      function playerStompsHazard(player, hazard) {
        return player.vy > 0 && player.y + player.h - player.vy <= hazard.y + Math.max(12, hazard.h * 0.72);
      }

      function updateHazards(dt) {
        const level = game.level;
        const p = game.player;
        const solids = solidsForLevel(level);
        for (const h of level.hazards) {
          if (h.delay && h.delay > 0) {
            h.delay -= dt;
            if (h.delay > 0) continue;
            h.delay = 0;
          }
          h.ttl -= dt;
          if (h.type === "landingWarning" && h.ttl <= 0 && !h.done) {
            h.done = true;
            const boss = h.targetBoss;
            if (boss && !boss.dead) {
              boss.x = h.x + h.w / 2 - boss.w / 2;
              boss.y = 346;
              boss.jumpTelegraph = null;
            }
            spawnHazard(level, { type: "slam", x: h.x, y: h.y, w: h.w, h: h.h, ttl: 0.28, deadly: true });
            game.screenShake = 18;
            playSfx("bossSlam");
          }
          if (h.type === "hammerWarning" && h.ttl <= 0 && !h.done) {
            h.done = true;
            if (level.boss) level.boss.hammerTelegraph = null;
            spawnHazard(level, { type: "hammerSmash", x: h.x, y: h.y, w: h.w, h: h.h, ttl: 0.34, deadly: true });
            game.screenShake = 16;
            playSfx("hammerSmash");
          }
          if (h.type === "rockWarning" && h.ttl <= 0 && !h.done) {
            h.done = true;
            spawnHazard(level, { type: "fallingRock", x: h.x + 8, y: 36, w: 40, h: 46, vx: 0, vy: 0, ttl: 3, deadly: true, gravity: 0.55 });
            playSfx("rockFall", 0.75);
          }
          if (h.static) {
            if (h.deadly && rectsOverlap(p, h)) demotePlayer(false);
            continue;
          }
          if (h.gravity) h.vy += h.gravity;
          h.x += h.vx || 0;
          h.y += h.vy || 0;
          if (h.type === "mayoBottle" || h.type === "fallingRock" || h.type === "trashcan") {
            for (const solid of solids) {
              if (rectsOverlap(hazardRect(h), solid) && h.vy >= 0) {
                if (h.type === "mayoBottle") {
                  spawnHazard(level, { type: "mayoPool", x: h.x - 22, y: solid.y - 13, w: 78, h: 15, ttl: 5, deadly: true });
                  playSfx("mayoSplat");
                } else if (h.type === "fallingRock") {
                  spawnHazard(level, { type: "rockBurst", x: h.x - 10, y: solid.y - 24, w: 60, h: 24, ttl: 0.35, deadly: true });
                  playSfx("rockCrash");
                }
                h.ttl = 0;
                break;
              }
            }
          }
          if (h.deadly && rectsOverlap(p, h)) {
            if (isStompableHazard(h) && playerStompsHazard(p, h)) {
              h.ttl = 0;
              p.vy = -11.8;
              p.y = h.y - p.h - 2;
              level.effects.push({ type: "pop", x: h.x + h.w / 2, y: h.y + h.h / 2, ttl: 0.42 });
              game.score += h.type === "bulletBill" ? 450 : 250;
              playSfx("bulletStomp");
              continue;
            }
            demotePlayer(false);
          }
        }
        level.hazards = level.hazards.filter((h) => h.ttl > 0 || h.static);
      }

      function updateEffects(dt) {
        const level = game.level;
        for (const block of level.blocks) {
          block.bump = Math.max(0, block.bump - dt);
        }
        for (const effect of level.effects) {
          effect.ttl -= dt;
        }
        level.effects = level.effects.filter((effect) => effect.ttl > 0);
      }

      function updateLevelFinish(dt) {
        const level = game.level;
        const p = game.player;
        if (level.flag.active && rectsOverlap(p, { x: level.flag.x - 10, y: level.flag.y, w: 74, h: 150 })) {
          level.clearTimer += dt;
          if (level.clearTimer > 0.5) {
            if (game.levelIndex < levelFactories.length - 1) {
              snapshotPlayerPower();
              game.score += 2500;
              playSfx("flagClear");
              loadLevel(game.levelIndex + 1);
            }
          }
        } else {
          level.clearTimer = 0;
        }

        if (level.rescue && level.rescue.active && rectsOverlap(p, level.rescue)) {
          game.mode = "win";
          game.score += 10000;
          playSfx("rescue");
          stopMusic();
          showOverlay("GG", `Young Sheldon got the peanut butter. Final score ${paddedScore(game.score)} with ${game.coins} coins.`, "Play Again");
        }
      }

      function update(dt) {
        if (game.mode !== "playing") {
          getInput();
          return;
        }
        game.globalTime += dt;
        updatePlayer(dt);
        updateCoins(dt);
        updatePowerups(dt);
        updateEnemies(dt);
        updateShots(dt);
        updateBoss(dt);
        updateBulletSpawners(dt);
        updateHazards(dt);
        updateEffects(dt);
        updateLevelFinish(dt);
        updateMusic();
        game.levelMessageTimer = Math.max(0, game.levelMessageTimer - dt);
        game.screenShake = Math.max(0, game.screenShake - dt * 18);
        const targetCamera = clamp(game.player.x - VIEW_W * 0.38, 0, Math.max(0, game.level.length - VIEW_W));
        game.cameraX = lerp(game.cameraX, targetCamera, 0.12);
        updateHud();
      }

      function updateHud() {
        const p = game.player;
        levelHud.textContent = `LEVEL ${game.levelIndex + 1}`;
        scoreHud.textContent = `SCORE ${paddedScore(game.score)}`;
        coinsHud.textContent = `COINS ${game.coins}`;
        powerHud.textContent = p.starTimer > 0 ? `${powerLabel(p.power)} ${Math.ceil(p.starTimer)}` : powerLabel(p.power);
        const boss = game.level?.boss;
        if (boss && boss.active && !boss.dead) {
          bossHud.hidden = false;
          bossName.textContent = boss.name;
          bossFill.style.transform = `scaleX(${clamp(boss.hp / boss.maxHp, 0, 1)})`;
        } else {
          bossHud.hidden = true;
        }
      }

      function drawBackground(c, level) {
        const x = game.cameraX;
        const bgName = {
          meadow: "bgMeadow",
          cave: "bgCave",
          plains: "bgPlains",
          sky: "bgSky",
          castle: "bgCastle"
        }[level.theme] || "bgMeadow";
        const bg = assets[bgName];
        if (bg && bg.complete && bg.naturalWidth > 0) {
          c.drawImage(bg, 0, 0, VIEW_W, VIEW_H);
          if (level.theme === "cave" || level.theme === "castle") {
            c.fillStyle = level.theme === "cave" ? "rgba(5, 3, 2, 0.2)" : "rgba(12, 2, 2, 0.18)";
            c.fillRect(0, 0, VIEW_W, VIEW_H);
          }
          return;
        }
        if (level.theme === "cave") {
          const g = c.createLinearGradient(0, 0, 0, VIEW_H);
          g.addColorStop(0, "#0e1017");
          g.addColorStop(0.45, "#1a1514");
          g.addColorStop(1, "#080709");
          c.fillStyle = g;
          c.fillRect(0, 0, VIEW_W, VIEW_H);
          drawParallaxCave(c, x);
          return;
        }
        if (level.theme === "sky") {
          const g = c.createLinearGradient(0, 0, 0, VIEW_H);
          g.addColorStop(0, "#6ab5ff");
          g.addColorStop(0.5, "#d5ecff");
          g.addColorStop(1, "#fff5cf");
          c.fillStyle = g;
          c.fillRect(0, 0, VIEW_W, VIEW_H);
          drawSun(c, 760 - x * 0.04, 86, 58);
          drawCloudLayer(c, x * 0.18, 74, 0.78, "rgba(255,255,255,0.86)");
          drawCloudLayer(c, x * 0.42, 176, 1.1, "rgba(255,255,255,0.68)");
          return;
        }
        if (level.theme === "castle") {
          const g = c.createLinearGradient(0, 0, 0, VIEW_H);
          g.addColorStop(0, "#211827");
          g.addColorStop(0.42, "#34222a");
          g.addColorStop(1, "#11080a");
          c.fillStyle = g;
          c.fillRect(0, 0, VIEW_W, VIEW_H);
          drawCastleBackdrop(c, x);
          return;
        }

        const g = c.createLinearGradient(0, 0, 0, VIEW_H);
        g.addColorStop(0, level.theme === "plains" ? "#78b6ff" : "#89c9ff");
        g.addColorStop(0.55, "#e9f7ff");
        g.addColorStop(1, "#f9d28a");
        c.fillStyle = g;
        c.fillRect(0, 0, VIEW_W, VIEW_H);
        drawSun(c, 730 - x * 0.04, 82, 52);
        drawCloudLayer(c, x * 0.14, 96, 0.72, "rgba(255,255,255,0.78)");
        drawMountains(c, x);
        drawDistantFields(c, x, level.theme === "plains");
      }

      function drawSun(c, x, y, r) {
        const g = c.createRadialGradient(x, y, 0, x, y, r * 2.3);
        g.addColorStop(0, "rgba(255,232,154,0.96)");
        g.addColorStop(0.28, "rgba(255,207,106,0.45)");
        g.addColorStop(1, "rgba(255,207,106,0)");
        c.fillStyle = g;
        c.beginPath();
        c.arc(x, y, r * 2.3, 0, Math.PI * 2);
        c.fill();
      }

      function drawCloudLayer(c, offset, y, scale, fill) {
        c.save();
        c.fillStyle = fill;
        for (let i = -1; i < 8; i += 1) {
          const cx = i * 230 - (offset % 230);
          c.beginPath();
          c.ellipse(cx + 38 * scale, y + 16 * Math.sin(i), 46 * scale, 18 * scale, 0, 0, Math.PI * 2);
          c.ellipse(cx + 84 * scale, y - 7, 58 * scale, 27 * scale, 0, 0, Math.PI * 2);
          c.ellipse(cx + 140 * scale, y + 14, 62 * scale, 20 * scale, 0, 0, Math.PI * 2);
          c.ellipse(cx + 174 * scale, y + 18, 34 * scale, 15 * scale, 0, 0, Math.PI * 2);
          c.fill();
        }
        c.restore();
      }

      function drawMountains(c, x) {
        c.save();
        c.translate(-(x * 0.08) % 980, 0);
        for (let repeat = -1; repeat < 3; repeat += 1) {
          const bx = repeat * 980;
          const g = c.createLinearGradient(0, 180, 0, 382);
          g.addColorStop(0, "#7b8f9f");
          g.addColorStop(1, "#e4e7d8");
          c.fillStyle = g;
          c.beginPath();
          c.moveTo(bx - 20, 382);
          c.lineTo(bx + 120, 214);
          c.lineTo(bx + 280, 382);
          c.lineTo(bx + 450, 176);
          c.lineTo(bx + 690, 382);
          c.lineTo(bx + 850, 234);
          c.lineTo(bx + 1010, 382);
          c.closePath();
          c.fill();
          c.fillStyle = "rgba(255,255,255,0.54)";
          c.beginPath();
          c.moveTo(bx + 450, 176);
          c.lineTo(bx + 520, 240);
          c.lineTo(bx + 474, 226);
          c.lineTo(bx + 426, 254);
          c.lineTo(bx + 390, 232);
          c.closePath();
          c.fill();
        }
        c.restore();
      }

      function drawDistantFields(c, x, plains) {
        c.save();
        c.translate(-(x * 0.18) % 760, 0);
        for (let repeat = -1; repeat < 4; repeat += 1) {
          const bx = repeat * 760;
          const g = c.createLinearGradient(0, 350, 0, VIEW_H);
          g.addColorStop(0, plains ? "#a6c16f" : "#94bc64");
          g.addColorStop(1, plains ? "#5f8a46" : "#437536");
          c.fillStyle = g;
          c.beginPath();
          c.moveTo(bx - 40, 430);
          c.bezierCurveTo(bx + 120, 356, bx + 250, 402, bx + 390, 354);
          c.bezierCurveTo(bx + 530, 306, bx + 665, 420, bx + 820, 360);
          c.lineTo(bx + 820, VIEW_H);
          c.lineTo(bx - 40, VIEW_H);
          c.closePath();
          c.fill();
        }
        c.restore();
      }

      function drawParallaxCave(c, x) {
        c.save();
        c.fillStyle = "#2a272c";
        c.translate(-(x * 0.1) % 500, 0);
        for (let i = -1; i < 5; i += 1) {
          const bx = i * 500;
          c.beginPath();
          c.moveTo(bx, 0);
          c.lineTo(bx + 58, 152);
          c.lineTo(bx + 102, 0);
          c.lineTo(bx + 206, 0);
          c.lineTo(bx + 262, 118);
          c.lineTo(bx + 318, 0);
          c.lineTo(bx + 500, 0);
          c.lineTo(bx + 500, 540);
          c.lineTo(bx, 540);
          c.closePath();
          c.fill();
        }
        c.restore();
        for (let i = 0; i < 4; i += 1) {
          const lx = 210 + i * 250 - (x * 0.28 % 250);
          const g = c.createRadialGradient(lx, 334, 0, lx, 334, 150);
          g.addColorStop(0, "rgba(255,155,61,0.22)");
          g.addColorStop(1, "rgba(255,155,61,0)");
          c.fillStyle = g;
          c.fillRect(lx - 150, 184, 300, 300);
        }
      }

      function drawCastleBackdrop(c, x) {
        c.save();
        c.translate(-(x * 0.14) % 320, 0);
        for (let i = -1; i < 5; i += 1) {
          const bx = i * 320;
          c.fillStyle = "#302a34";
          c.fillRect(bx + 22, 105, 80, 360);
          c.fillRect(bx + 150, 52, 110, 410);
          c.fillStyle = "rgba(255,182,82,0.2)";
          c.fillRect(bx + 52, 180, 20, 72);
          c.fillRect(bx + 188, 134, 24, 86);
        }
        c.restore();
        const lava = c.createLinearGradient(0, 440, 0, VIEW_H);
        lava.addColorStop(0, "rgba(255,74,31,0.18)");
        lava.addColorStop(1, "rgba(255,157,45,0.08)");
        c.fillStyle = lava;
        c.fillRect(0, 410, VIEW_W, 130);
      }

      function drawPlatform(c, platform) {
        const x = Math.round(platform.x - game.cameraX);
        const y = platform.y;
        if (x + platform.w < -60 || x > VIEW_W + 60) return;
        if (platform.type === "cloud") {
          drawCloudPlatform(c, x, y, platform.w, platform.h);
          return;
        }
        if (platform.type === "castle" || platform.type === "gate") {
          const g = c.createLinearGradient(0, y, 0, y + platform.h);
          g.addColorStop(0, "#7e7680");
          g.addColorStop(1, "#3a343d");
          c.fillStyle = g;
          c.fillRect(x, y, platform.w, platform.h);
          c.strokeStyle = "rgba(255,255,255,0.18)";
          c.lineWidth = 2;
          for (let tx = x; tx < x + platform.w; tx += 54) {
            c.strokeRect(tx, y, 54, platform.h);
          }
          c.fillStyle = "rgba(255,92,38,0.45)";
          c.fillRect(x, y + platform.h - 6, platform.w, 6);
          return;
        }
        if (platform.type === "cave") {
          const g = c.createLinearGradient(0, y, 0, y + platform.h);
          g.addColorStop(0, "#6c625b");
          g.addColorStop(1, "#211c1e");
          c.fillStyle = g;
          c.fillRect(x, y, platform.w, platform.h);
          c.fillStyle = "#3f3837";
          for (let tx = x + 8; tx < x + platform.w; tx += 42) {
            c.fillRect(tx, y + 5 + ((tx / 42) % 2) * 10, 24, 5);
          }
          return;
        }
        const dirt = c.createLinearGradient(0, y, 0, y + platform.h);
        dirt.addColorStop(0, "#9b703c");
        dirt.addColorStop(1, "#4c311d");
        c.fillStyle = dirt;
        c.fillRect(x, y, platform.w, platform.h);
        const grass = c.createLinearGradient(0, y - 10, 0, y + 12);
        grass.addColorStop(0, "#9eed69");
        grass.addColorStop(1, "#347d32");
        c.fillStyle = grass;
        c.fillRect(x, y, platform.w, Math.min(16, platform.h));
        c.fillStyle = "rgba(35,20,8,0.22)";
        for (let tx = x + 10; tx < x + platform.w; tx += 37) {
          c.beginPath();
          c.arc(tx, y + 30 + (tx % 5), 4, 0, Math.PI * 2);
          c.fill();
        }
      }

      function drawBlock(c, block) {
        if (!block.alive) return;
        const x = Math.round(block.x - game.cameraX);
        if (x + block.w < -60 || x > VIEW_W + 60) return;
        const bumpY = block.bump > 0 ? -Math.sin((block.bump / 0.22) * Math.PI) * 9 : 0;
        const assetName = block.kind === "question" && !block.used ? "question" : "brick";
        const ok = drawAsset(c, assetName, x, block.y + bumpY, block.w, block.h, { alpha: block.used ? 0.72 : 1 });
        if (!ok) {
          c.fillStyle = block.kind === "question" && !block.used ? "#d99d28" : "#8d4d28";
          c.fillRect(x, block.y + bumpY, block.w, block.h);
        }
      }

      function drawCloudPlatform(c, x, y, w, h) {
        c.save();
        c.fillStyle = "rgba(255,255,255,0.98)";
        c.shadowColor = "rgba(72,119,172,0.22)";
        c.shadowBlur = 18;
        c.beginPath();
        c.ellipse(x + 32, y + 15, 36, 22, 0, 0, Math.PI * 2);
        for (let tx = x + 64; tx < x + w - 24; tx += 44) {
          c.ellipse(tx, y + 10 + Math.sin(tx) * 2, 38, 25, 0, 0, Math.PI * 2);
        }
        c.ellipse(x + w - 24, y + 16, 34, 20, 0, 0, Math.PI * 2);
        c.fill();
        c.shadowBlur = 0;
        c.fillStyle = "rgba(129,171,215,0.26)";
        c.fillRect(x + 16, y + h - 4, w - 34, 5);
        c.restore();
      }

      function drawCoin(c, coin) {
        if (coin.taken) return;
        const x = coin.x - game.cameraX + coin.r;
        const y = coin.y + coin.r + Math.sin(coin.bob) * 3;
        if (x < -30 || x > VIEW_W + 30) return;
        c.save();
        c.translate(x, y);
        const spin = Math.max(0.26, Math.abs(Math.cos(game.globalTime * 5 + coin.bob)));
        c.scale(spin, 1);
        drawAssetContain(c, "coin", -15, -17, 30, 34);
        c.restore();
      }

      function drawPeanutJar(c, x, y, w, h, type, bob = 0) {
        const assetName = { pb: "pb", flame: "flame", rainbow: "rainbow", cat: "cat" }[type] || "pb";
        drawAssetContain(c, assetName, x - 5, y - 8 + Math.sin(bob) * 3, w + 10, h + 16, {
          rotate: Math.sin(game.globalTime * 3 + bob) * 0.025
        });
      }

      function starPath(c, x, y, outer, inner, points) {
        let angle = -Math.PI / 2;
        const step = Math.PI / points;
        c.beginPath();
        for (let i = 0; i < points * 2; i += 1) {
          const r = i % 2 === 0 ? outer : inner;
          c.lineTo(x + Math.cos(angle) * r, y + Math.sin(angle) * r);
          angle += step;
        }
        c.closePath();
      }

      function drawPowerup(c, item) {
        if (item.taken) return;
        const x = item.x - game.cameraX;
        if (x < -60 || x > VIEW_W + 60) return;
        drawPeanutJar(c, x, item.y, item.w, item.h, item.type, item.bob);
      }

      function drawStickmanPlayer(c, p) {
        const x = p.x - game.cameraX;
        const y = p.y;
        if (x < -100 || x > VIEW_W + 100) return;
        const walkAmount = clamp(Math.abs(p.vx) / 5, 0, 1);
        const stride = Math.sin(game.globalTime * 13 + Math.abs(p.vx) * 0.35) * walkAmount;
        const visualH = p.h + (p.power === "small" ? 16 : 22);
        const visualW = visualH * 0.62;
        const drawX = x + p.w / 2 - visualW / 2;
        const drawY = y + p.h - visualH - Math.abs(stride) * 5;
        c.save();
        if (p.invuln > 0 && Math.floor(game.globalTime * 18) % 2 === 0) c.globalAlpha = 0.48;
        if (p.starTimer > 0) {
          const aura = c.createRadialGradient(x + p.w / 2, y + p.h / 2, 0, x + p.w / 2, y + p.h / 2, 70);
          aura.addColorStop(0, "rgba(255,255,255,0.2)");
          aura.addColorStop(0.4, `hsla(${game.globalTime * 160 % 360}, 95%, 62%, 0.32)`);
          aura.addColorStop(1, "rgba(255,255,255,0)");
          c.fillStyle = aura;
          c.beginPath();
          c.arc(x + p.w / 2, y + p.h / 2, 72, 0, Math.PI * 2);
          c.fill();
        }
        drawAssetContain(c, "hero", drawX, drawY, visualW, visualH, {
          flip: p.facing < 0,
          rotate: stride * 0.085,
          squash: Math.abs(stride) * 1.35
        });
        if (p.power !== "small") {
          drawPeanutJar(c, x + p.w / 2 + p.facing * 18 - 12, y + 24, 24, 24, p.power === "rainbow" ? "rainbow" : p.power, game.globalTime * 4);
        }
        c.restore();
      }

      function drawIdkSterlingHead(c, x, y, r, facing, cat) {
        c.save();
        c.translate(x, y);
        c.scale(facing, 1);
        if (cat) {
          c.fillStyle = "#17130f";
          c.beginPath();
          c.moveTo(-r * 0.76, -r * 0.58);
          c.lineTo(-r * 0.42, -r * 1.25);
          c.lineTo(-r * 0.12, -r * 0.66);
          c.fill();
          c.beginPath();
          c.moveTo(r * 0.76, -r * 0.58);
          c.lineTo(r * 0.42, -r * 1.25);
          c.lineTo(r * 0.12, -r * 0.66);
          c.fill();
        }
        const skin = c.createRadialGradient(-r * 0.28, -r * 0.2, r * 0.12, 0, 0, r * 1.1);
        skin.addColorStop(0, "#ffd8bf");
        skin.addColorStop(0.58, "#d69377");
        skin.addColorStop(1, "#9e634c");
        c.fillStyle = skin;
        c.beginPath();
        c.ellipse(0, 1, r * 0.86, r * 1.02, 0.04, 0, Math.PI * 2);
        c.fill();
        c.fillStyle = "#181412";
        c.beginPath();
        c.ellipse(0, -r * 0.67, r * 0.92, r * 0.36, 0.05, Math.PI, Math.PI * 2);
        c.fill();
        for (let i = 0; i < 14; i += 1) {
          c.beginPath();
          c.arc(-r * 0.78 + i * r * 0.12, -r * 0.78 + Math.sin(i) * 2, r * 0.17, 0, Math.PI * 2);
          c.fill();
        }
        c.fillStyle = "#1f1815";
        c.beginPath();
        c.ellipse(0, r * 0.42, r * 0.62, r * 0.46, 0, 0, Math.PI * 2);
        c.fill();
        c.fillStyle = skin;
        c.beginPath();
        c.ellipse(0, r * 0.04, r * 0.68, r * 0.58, 0, 0, Math.PI * 2);
        c.fill();
        c.fillStyle = "#1c1513";
        c.beginPath();
        c.arc(-r * 0.72, -r * 0.02, r * 0.2, Math.PI * 0.5, Math.PI * 1.55);
        c.arc(r * 0.72, -r * 0.02, r * 0.2, Math.PI * 1.45, Math.PI * 0.5, true);
        c.fill();
        c.strokeStyle = "#201513";
        c.lineWidth = Math.max(2, r * 0.1);
        c.lineCap = "round";
        c.beginPath();
        c.moveTo(-r * 0.48, -r * 0.28);
        c.lineTo(-r * 0.1, -r * 0.36);
        c.moveTo(r * 0.48, -r * 0.29);
        c.lineTo(r * 0.12, -r * 0.36);
        c.stroke();
        c.fillStyle = "#292726";
        c.beginPath();
        c.ellipse(-r * 0.28, -r * 0.13, r * 0.07, r * 0.04, 0, 0, Math.PI * 2);
        c.ellipse(r * 0.28, -r * 0.13, r * 0.07, r * 0.04, 0, 0, Math.PI * 2);
        c.fill();
        c.strokeStyle = "rgba(94,47,37,0.55)";
        c.lineWidth = 1.4;
        c.beginPath();
        c.moveTo(0, -r * 0.08);
        c.quadraticCurveTo(r * 0.1, r * 0.12, -r * 0.05, r * 0.18);
        c.stroke();
        c.strokeStyle = "#6f332e";
        c.lineWidth = 2;
        c.beginPath();
        c.moveTo(-r * 0.22, r * 0.36);
        c.quadraticCurveTo(0, r * 0.43, r * 0.22, r * 0.34);
        c.stroke();
        c.restore();
      }

      function drawGoober(c, enemy) {
        const x = enemy.x - game.cameraX;
        const y = enemy.y;
        if (x < -80 || x > VIEW_W + 80) return;
        const step = Math.sin(enemy.phase) * 6;
        drawAssetContain(c, "goober", x - 9, y - 12 + Math.abs(step) * 0.16, enemy.w + 18, enemy.h + 24, {
          flip: enemy.vx < 0,
          rotate: step * 0.008,
          squash: Math.abs(step) / 6
        });
      }

      function drawToilet(c, enemy) {
        const x = enemy.x - game.cameraX;
        const y = enemy.y;
        if (x < -100 || x > VIEW_W + 100) return;
        const step = Math.sin(enemy.phase) * 6;
        const assetName = enemy.state === "shell" && enemy.type !== "flyingToilet" ? "toiletShell" : "toiletWalk";
        const extra = enemy.type === "flyingToilet" ? 20 : 8;
        drawAssetContain(c, assetName, x - extra / 2, y - extra + Math.abs(step) * 0.16, enemy.w + extra, enemy.h + extra * 1.2, {
          flip: enemy.vx > 0,
          rotate: enemy.type === "flyingToilet" ? Math.sin(enemy.phase) * 0.07 : step * 0.006,
          squash: enemy.type === "flyingToilet" ? 0 : Math.abs(step) / 7
        });
      }

      function drawEnemy(c, enemy) {
        if (!enemy.alive) return;
        if (enemy.type === "goober") drawGoober(c, enemy);
        if (enemy.type === "toilet" || enemy.type === "flyingToilet") drawToilet(c, enemy);
      }

      function drawShot(c, shot) {
        const x = shot.x - game.cameraX;
        if (x < -80 || x > VIEW_W + 80) return;
        c.save();
        c.translate(x + shot.w / 2, shot.y + shot.h / 2);
        if (shot.type === "claw") {
          drawAssetContain(c, "cat", -18, -18, 36, 36, { flip: shot.facing < 0, rotate: game.globalTime * 8 });
        } else {
          const assetName = shot.type === "rainbow" ? "rainbow" : "flame";
          drawAssetContain(c, assetName, -18, -18, 36, 36, { rotate: game.globalTime * 6 });
        }
        c.restore();
      }

      function drawHazard(c, h) {
        if (h.delay && h.delay > 0) return;
        const x = h.x - game.cameraX;
        if (x + h.w < -120 || x > VIEW_W + 120) return;
        c.save();
        c.translate(x, h.y);
        if (h.type === "bullet" || h.type === "bulletBill") {
          drawAssetContain(c, "bullet", -5, -7, h.w + 18, h.h + 16, { flip: (h.vx || -1) > 0 });
        } else if (h.type === "car") {
          drawAssetContain(c, "car", 0, -12, h.w, h.h + 28, { flip: (h.vx || -1) > 0 });
        } else if (h.type === "trashcan") {
          drawAssetContain(c, "trashcan", -8, -8, h.w + 18, h.h + 18, { rotate: game.globalTime * 5 });
        } else if (h.type === "landingWarning" || h.type === "hammerWarning" || h.type === "rockWarning") {
          c.fillStyle = "rgba(255,40,40,0.18)";
          c.strokeStyle = "rgba(255,230,130,0.84)";
          c.lineWidth = 3;
          c.setLineDash([8, 7]);
          c.strokeRect(0, 0, h.w, h.h);
          c.fillRect(0, 0, h.w, h.h);
        } else if (h.type === "slam") {
          c.fillStyle = "rgba(255,214,94,0.38)";
          c.fillRect(0, 0, h.w, h.h);
          c.strokeStyle = "#ff513f";
          c.lineWidth = 4;
          c.strokeRect(0, 0, h.w, h.h);
        } else if (h.type === "mayoBottle") {
          drawAssetContain(c, "mayoBottle", -10, -8, h.w + 20, h.h + 16, { rotate: game.globalTime * 5 });
        } else if (h.type === "mayoPool") {
          drawAsset(c, "mayoPool", 0, -18, h.w, h.h + 28);
        } else if (h.type === "hammerSmash") {
          drawAssetContain(c, "hammerSmash", -18, -40, h.w + 36, h.h + 52);
        } else if (h.type === "shockwave") {
          drawAssetContain(c, "shockwave", -10, -30, h.w + 22, h.h + 44, { flip: (h.vx || 1) < 0 });
        } else if (h.type === "fallingRock" || h.type === "rockBurst") {
          drawAssetContain(c, "rock", -8, -8, h.w + 16, h.h + 16, { rotate: game.globalTime * 3 });
        } else if (h.type === "lava") {
          drawAsset(c, "lavaPool", 0, -10, h.w, h.h + 18);
        }
        c.restore();
      }

      function drawBoss(c, boss) {
        if (!boss || boss.dead || !boss.active) return;
        const x = boss.x - game.cameraX;
        if (x < -180 || x > VIEW_W + 180) return;
        c.save();
        if (boss.flash > 0 && Math.floor(game.globalTime * 30) % 2 === 0) c.globalAlpha = 0.58;
        const intro = boss.intro;
        const walk = intro ? 0 : Math.sin(game.globalTime * (boss.kind === "cole" ? 7 : 8));
        const sway = walk * 0.055;
        if (boss.kind === "king") {
          if (intro?.type === "fall") {
            c.save();
            c.strokeStyle = "rgba(255, 245, 200, 0.62)";
            c.lineWidth = 4;
            c.lineCap = "round";
            for (let i = 0; i < 8; i += 1) {
              const lineX = x + 8 + i * 13;
              const top = boss.y - 92 - (i % 3) * 22;
              c.beginPath();
              c.moveTo(lineX, top);
              c.lineTo(lineX - 12, top + 72);
              c.stroke();
            }
            c.restore();
          }
          const jump = boss.jumpTelegraph;
          const jumpT = jump ? clamp(1 - jump.ttl / jump.duration, 0, 1) : 0;
          const introLean = intro?.type === "fall" ? Math.sin(game.globalTime * 12) * 0.1 : 0;
          drawAssetContain(c, "king", x - 22, boss.y - 10 - Math.abs(walk) * 3, boss.w + 44, boss.h + 34, {
            rotate: sway + Math.sin(jumpT * Math.PI) * 0.14 + introLean,
            squash: Math.abs(walk) * 0.35
          });
        }
        if (boss.kind === "cole") {
          if (intro?.type === "emerge") {
            const t = clamp(1 - intro.ttl / intro.duration, 0, 1);
            c.save();
            c.fillStyle = "rgba(18, 8, 10, 0.78)";
            c.beginPath();
            c.ellipse(x + boss.w / 2, 465, 92, 18 + t * 8, 0, 0, Math.PI * 2);
            c.fill();
            c.strokeStyle = "rgba(255, 230, 160, 0.34)";
            c.lineWidth = 3;
            c.stroke();
            c.fillStyle = "rgba(180, 150, 120, 0.34)";
            for (let i = 0; i < 7; i += 1) {
              c.beginPath();
              c.arc(x + 8 + i * 18, 455 - Math.sin(game.globalTime * 4 + i) * 7, 5 + (i % 3), 0, Math.PI * 2);
              c.fill();
            }
            c.restore();
          }
          const hammer = boss.hammerTelegraph;
          const hammerT = hammer ? clamp(1 - hammer.ttl / hammer.duration, 0, 1) : 0;
          const emergeLean = intro?.type === "emerge" ? Math.sin(game.globalTime * 10) * 0.07 : 0;
          drawAssetContain(c, "cole", x - 18 - hammerT * 18, boss.y - 12 - Math.abs(walk) * 3, boss.w + 58, boss.h + 38, {
            rotate: sway * 0.7 - hammerT * 0.38 + emergeLean,
            squash: Math.abs(walk) * 0.28
          });
        }
        c.restore();
      }

      function drawKingBoss(c, x, y, boss) {
        const walk = Math.sin(game.globalTime * 8) * 5;
        const cx = x + boss.w / 2;
        c.strokeStyle = "#090909";
        c.lineWidth = 8;
        c.lineCap = "round";
        c.beginPath();
        c.moveTo(cx, y + 52);
        c.lineTo(cx, y + 88);
        c.moveTo(cx, y + 66);
        c.lineTo(cx - 35, y + 92 + walk);
        c.moveTo(cx, y + 66);
        c.lineTo(cx + 35, y + 90 - walk);
        c.moveTo(cx, y + 88);
        c.lineTo(cx - 26 - walk, y + 114);
        c.moveTo(cx, y + 88);
        c.lineTo(cx + 26 + walk, y + 114);
        c.stroke();
        drawKingHead(c, cx, y + 32, 28);
        if (boss.pose === "blicky") {
          c.fillStyle = "#111";
          drawRoundRect(c, cx - 58, y + 67, 40, 12, 3);
          c.fill();
          c.fillRect(cx - 55, y + 77, 12, 18);
        } else if (boss.pose === "trashcan") {
          c.fillStyle = "#8d9aa1";
          drawRoundRect(c, cx - 52, y + 50, 30, 38, 5);
          c.fill();
        }
      }

      function drawKingHead(c, x, y, r) {
        c.save();
        c.translate(x, y);
        c.fillStyle = "#111";
        for (let i = 0; i < 14; i += 1) {
          const angle = (i / 13) * Math.PI - Math.PI;
          c.strokeStyle = i % 4 === 0 ? "#dedede" : "#111";
          c.lineWidth = 5;
          c.beginPath();
          c.moveTo(Math.cos(angle) * r * 0.55, -r * 0.48 + Math.sin(angle) * r * 0.15);
          c.quadraticCurveTo(Math.cos(angle) * r * 1.2, r * 0.1, Math.cos(angle) * r * 0.9, r * 0.82);
          c.stroke();
        }
        const g = c.createRadialGradient(-7, -7, 2, 0, 0, r);
        g.addColorStop(0, "#6b6b6b");
        g.addColorStop(1, "#1e1e1e");
        c.fillStyle = g;
        c.beginPath();
        c.ellipse(0, 0, r * 0.76, r * 0.9, 0, 0, Math.PI * 2);
        c.fill();
        c.fillStyle = "#f1f1f1";
        c.beginPath();
        c.ellipse(-8, -5, 4, 2.6, 0, 0, Math.PI * 2);
        c.ellipse(8, -5, 4, 2.6, 0, 0, Math.PI * 2);
        c.fill();
        c.strokeStyle = "#050505";
        c.lineWidth = 2;
        c.beginPath();
        c.moveTo(-12, -12);
        c.lineTo(-3, -9);
        c.moveTo(12, -12);
        c.lineTo(3, -9);
        c.stroke();
        c.strokeStyle = "#ececec";
        c.beginPath();
        c.moveTo(-9, 13);
        c.quadraticCurveTo(0, 18, 10, 13);
        c.stroke();
        c.restore();
      }

      function drawColeBoss(c, x, y, boss) {
        const cx = x + boss.w / 2;
        const flex = Math.sin(game.globalTime * 5) * 4;
        c.fillStyle = "#8f5131";
        drawRoundRect(c, cx - 42, y + 48, 84, 70, 18);
        c.fill();
        c.strokeStyle = "#1b1514";
        c.lineWidth = 12;
        c.lineCap = "round";
        c.beginPath();
        c.moveTo(cx - 34, y + 66);
        c.lineTo(cx - 72 - flex, y + 98);
        c.moveTo(cx + 34, y + 66);
        c.lineTo(cx + 74 + flex, y + 92);
        c.moveTo(cx - 22, y + 116);
        c.lineTo(cx - 34, y + 150);
        c.moveTo(cx + 22, y + 116);
        c.lineTo(cx + 34, y + 150);
        c.stroke();
        c.fillStyle = "#d39b68";
        c.beginPath();
        c.ellipse(cx - 48 - flex, y + 99, 17, 17, 0, 0, Math.PI * 2);
        c.ellipse(cx + 50 + flex, y + 93, 17, 17, 0, 0, Math.PI * 2);
        c.fill();
        drawColeHead(c, cx, y + 31, 30);
        if (boss.pose === "hammer") {
          c.fillStyle = "#3b3636";
          drawRoundRect(c, cx + 44, y + 42, 72, 28, 5);
          c.fill();
          c.strokeStyle = "#6a4028";
          c.lineWidth = 8;
          c.beginPath();
          c.moveTo(cx + 44, y + 62);
          c.lineTo(cx + 5, y + 112);
          c.stroke();
        }
      }

      function drawColeHead(c, x, y, r) {
        c.save();
        c.translate(x, y);
        c.fillStyle = "#f7f7f7";
        c.beginPath();
        c.ellipse(0, 0, r * 0.9, r, 0, 0, Math.PI * 2);
        c.fill();
        c.strokeStyle = "#080808";
        c.lineWidth = 4;
        c.stroke();
        c.strokeStyle = "#090909";
        c.lineWidth = 4;
        c.lineCap = "round";
        c.beginPath();
        c.moveTo(-16, -9);
        c.lineTo(-5, -4);
        c.moveTo(16, -9);
        c.lineTo(5, -4);
        c.stroke();
        c.fillStyle = "#090909";
        c.beginPath();
        c.arc(-10, -1, 3, 0, Math.PI * 2);
        c.arc(10, -1, 3, 0, Math.PI * 2);
        c.fill();
        c.strokeStyle = "#090909";
        c.lineWidth = 3;
        c.beginPath();
        c.arc(0, 14, 12, Math.PI * 1.15, Math.PI * 1.85);
        c.stroke();
        c.restore();
      }

      function drawFlag(c, flag) {
        if (!flag.active) return;
        const x = flag.x - game.cameraX;
        if (x < -80 || x > VIEW_W + 80) return;
        drawAssetContain(c, "flag", x - 20, flag.y - 72, 105, 188);
      }

      function drawPipe(c, pipe) {
        const x = pipe.x - game.cameraX;
        const y = pipe.y;
        if (x < -100 || x > VIEW_W + 100) return;
        const g = c.createLinearGradient(x, y, x + pipe.w, y);
        g.addColorStop(0, "#164f31");
        g.addColorStop(0.3, "#2ba95d");
        g.addColorStop(1, "#0a3b26");
        c.fillStyle = g;
        drawRoundRect(c, x, y + 18, pipe.w, pipe.h - 18, 5);
        c.fill();
        drawRoundRect(c, x - 10, y, pipe.w + 20, 28, 6);
        c.fill();
        c.strokeStyle = "rgba(255,255,255,0.22)";
        c.lineWidth = 3;
        c.beginPath();
        c.moveTo(x + 22, y + 30);
        c.lineTo(x + 22, y + pipe.h);
        c.stroke();
      }

      function drawCheckpoint(c, level) {
        const cp = level.checkpoint;
        const x = cp.x - game.cameraX;
        if (x < -80 || x > VIEW_W + 80) return;
        c.save();
        c.translate(x, 350);
        c.fillStyle = level.checkpointReached ? "#ffe27c" : "rgba(255,255,255,0.4)";
        c.fillRect(0, -42, 5, 92);
        c.beginPath();
        c.moveTo(5, -42);
        c.lineTo(48, -28);
        c.lineTo(5, -12);
        c.closePath();
        c.fill();
        c.restore();
      }

      function drawRescue(c, rescue) {
        if (!rescue || !rescue.active) return;
        const x = rescue.x - game.cameraX;
        const y = rescue.y;
        drawAssetContain(c, "rescue", x - 16, y - 18 + Math.sin(game.globalTime * 3) * 2, rescue.w + 34, rescue.h + 34);
      }

      function drawEffects(c) {
        for (const effect of game.level.effects) {
          const x = effect.x - game.cameraX;
          const y = effect.y;
          c.save();
          c.globalAlpha = clamp(effect.ttl * 2, 0, 1);
          if (effect.type === "pop" || effect.type === "bossPop") {
            c.strokeStyle = effect.type === "bossPop" ? "#ffe28a" : "#fff";
            c.lineWidth = effect.type === "bossPop" ? 8 : 4;
            for (let i = 0; i < 10; i += 1) {
              const a = (i / 10) * Math.PI * 2;
              const r = (1 - effect.ttl) * (effect.type === "bossPop" ? 90 : 38);
              c.beginPath();
              c.moveTo(x + Math.cos(a) * r * 0.4, y + Math.sin(a) * r * 0.4);
              c.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
              c.stroke();
            }
          } else if (effect.type === "brickBurst") {
            for (let i = 0; i < 6; i += 1) {
              const a = (i / 6) * Math.PI * 2;
              const dist = (0.6 - effect.ttl) * 74;
              drawAsset(c, "brick", x + Math.cos(a) * dist - 7, y + Math.sin(a) * dist - 7, 14, 14, { rotate: game.globalTime * 5 + i });
            }
          } else if (effect.type === "coin" || effect.type === "sparkle" || effect.type === "paw") {
            c.fillStyle = effect.type === "paw" ? "#ffe3a3" : "#fff4a8";
            for (let i = 0; i < 8; i += 1) {
              const a = (i / 8) * Math.PI * 2 + game.globalTime * 3;
              c.beginPath();
              c.arc(x + Math.cos(a) * 20 * (1 - effect.ttl), y + Math.sin(a) * 20 * (1 - effect.ttl), 3, 0, Math.PI * 2);
              c.fill();
            }
          }
          c.restore();
        }
      }

      function drawMessage(c) {
        if (game.levelMessageTimer <= 0) return;
        c.save();
        c.globalAlpha = clamp(game.levelMessageTimer, 0, 1);
        c.fillStyle = "rgba(8,10,15,0.58)";
        drawRoundRect(c, VIEW_W / 2 - 170, 78, 340, 54, 8);
        c.fill();
        c.fillStyle = "#fff3d0";
        c.font = "900 22px system-ui";
        c.textAlign = "center";
        c.textBaseline = "middle";
        c.fillText(game.levelMessage, VIEW_W / 2, 105);
        c.restore();
      }

      function draw() {
        const level = game.level || levelFactories[0]();
        const shakeX = game.screenShake > 0 ? (seeded() - 0.5) * game.screenShake : 0;
        const shakeY = game.screenShake > 0 ? (seeded() - 0.5) * game.screenShake : 0;
        ctx.save();
        ctx.clearRect(0, 0, VIEW_W, VIEW_H);
        ctx.translate(shakeX, shakeY);
        drawBackground(ctx, level);
        for (const pipe of level.pipes) drawPipe(ctx, pipe);
        for (const platform of level.platforms) drawPlatform(ctx, platform);
        for (const block of level.blocks) drawBlock(ctx, block);
        if (level.boss && level.boss.active && !level.boss.dead) {
          drawPlatform(ctx, { x: level.boss.arenaEnd, y: 210, w: 26, h: 260, type: "gate", solid: true });
        }
        drawCheckpoint(ctx, level);
        for (const coin of level.coins) drawCoin(ctx, coin);
        for (const item of level.powerups) drawPowerup(ctx, item);
        for (const h of level.hazards) drawHazard(ctx, h);
        for (const shot of level.shots) drawShot(ctx, shot);
        for (const enemy of level.enemies) drawEnemy(ctx, enemy);
        drawBoss(ctx, level.boss);
        drawFlag(ctx, level.flag);
        drawRescue(ctx, level.rescue);
        if (game.player) drawStickmanPlayer(ctx, game.player);
        drawEffects(ctx);
        drawMessage(ctx);
        ctx.restore();
      }

      let last = performance.now();
      function frame(now) {
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;
        update(dt);
        draw();
        requestAnimationFrame(frame);
      }

      showOverlay("Peanut Butter Stick Quest", "Controls: Arrow keys or A/D move, Space/W/Up jump, F/X/K/Shift attack after powerups. Boss at level 3 and 5.", "Play");
      loadLevel(0);
      updateHud();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
